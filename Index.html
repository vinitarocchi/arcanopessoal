<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcano Pessoal - Vini Astros</title>
    <style>
        :root {
            /* Cores extraídas da imagem e adaptadas para Dark Mode */
            --bg-color: #131314; /* Preto/Cinza escuro do fundo da imagem */
            --card-bg: #1e1e20; /* Fundo do container ligeiramente mais claro */
            --primary-blue: #2b52c3; /* Azul do botão da imagem */
            --primary-blue-hover: #22429e;
            --text-main: #e8eaed; /* Texto claro para leitura */
            --text-muted: #9aa0a6; /* Texto secundário */
            --border-color: #3c4043; /* Bordas no modo escuro */
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 25px 15px;
            box-sizing: border-box;
            background-image: radial-gradient(#3c4043 1px, transparent 1px);
            background-size: 15px 15px;
        }
        
        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .rosemary-decor {
            position: absolute;
            opacity: 0.1;
            width: 85px;
            pointer-events: none;
        }
        .rosemary-left { top: -15px; left: -15px; transform: rotate(45deg); }
        .rosemary-right { bottom: -15px; right: -15px; transform: rotate(-135deg); }

        h1 {
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 4px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-slots {
            display: flex;
            gap: 10px;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            font-size: 0.85rem;
            background-color: #282a2c; /* Inputs escuros */
            border: 2px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        /* Corrigido o ícone SVG do select para ficar visível no fundo escuro (fill mudou para #9aa0a6) */
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239aa0a6%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 10px auto;
        }

        .date-slots select:nth-child(1),
        .date-slots select:nth-child(2) { width: 30%; }
        .date-slots select:nth-child(3) { width: 40%; }

        select:focus, input:focus {
            background-color: #303236;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(43, 82, 195, 0.2);
        }

        .names-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 0.8rem 0 1.5rem 0;
            min-height: 40px;
        }

        .name-block {
            background-color: #282a2c;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: fadeIn 0.3s ease;
        }

        .name-block .word {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: capitalize;
        }

        .name-block .number {
            font-size: 0.85rem;
            font-weight: 700;
            color: #8bb2e5; /* Azul mais claro para destacar no fundo escuro */
        }

        .btn-calc {
            background-color: var(--primary-blue);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 3px 10px rgba(43, 82, 195, 0.3);
            margin-top: 10px;
        }

        .btn-calc:hover {
            background-color: var(--primary-blue-hover);
            transform: translateY(-2px);
        }

        .results-area {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 2.5rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section {
            background-color: #282a2c;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 15px;
            position: relative;
        }

        .section-title {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--primary-blue);
            color: #ffffff;
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cards-display {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        .tarot-img {
            width: 95px;
            border-radius: 6px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            position: relative;
        }

        .tarot-img:hover {
            transform: translateY(-4px);
            z-index: 10 !important;
        }

        .tarot-img.secondary {
            margin-left: -35px;
            z-index: 1;
            transform: rotate(3deg) translateY(4px);
        }
        
        .tarot-img.primary {
            z-index: 2;
        }

        .secondary-note {
            background-color: rgba(43, 82, 195, 0.15);
            border-left: 3px solid var(--primary-blue);
            padding: 12px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 20px;
            text-align: left;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #d1d5db; /* Texto adaptado pro fundo escuro */
        }

        .secondary-note strong {
            color: #8bb2e5;
            display: block;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }

        .influence-text {
            text-align: left;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .influence-text h4 {
            margin: 0 0 12px 0;
            color: var(--text-main);
            font-size: 0.9rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .influence-item {
            margin-bottom: 10px;
        }

        .influence-item strong {
            color: #8bb2e5;
            background-color: rgba(139, 178, 229, 0.15);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 3px;
        }
    </style>
</head>

        // Inicializa os seletores de Data

            const daySel = document.getElementById('dayInput');

            }
            
            const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            const monthSel = document.getElementById('monthInput');

                const val = (index + 1).toString().padStart(2, '0');
                monthSel.innerHTML += `<option value="${val}">${m}</option>`;
            });
            
            const yearSel = document.getElementById('yearInput');
            for(let i=2026; i>=1900; i--) {
                const isSelected = (i === 1900) ? 'selected' : '';
                yearSel.innerHTML += `<option value="${i}" ${isSelected}>${i}</option>`;
            }

        function sumStringDigits(str) {
            return str.split('').reduce((acc, digit) => acc + parseInt(digit), 0);
        }

        function reduceToSingleDigit(num) {
            if (num === 0) return 0;
            let sum = num;
            while (sum > 9) {
                sum = sum.toString().split('').reduce((acc, digit) => acc + parseInt(digit), 0);
            }
            return sum;
        }

        function calculateLive() {
            const rawValue = document.getElementById('nameInput').value;
            const namesRow = document.getElementById('namesRow');
            
            namesRow.innerHTML = '';
            
            if (!rawValue.trim()) return;

            const words = rawValue.split(/\s+/).filter(w => w.length > 0);

            words.forEach(word => {
                const normalizedWord = word
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toUpperCase()
                    .replace(/[^A-Z]/g, '');

                let wordTotal = 0;
                for (let char of normalizedWord) {
                    if (chaldeanValues[char]) wordTotal += chaldeanValues[char];
                }

                if (wordTotal > 0) {
                    const reduced = reduceToSingleDigit(wordTotal);
                    const block = document.createElement('div');
                    block.className = 'name-block';
                    block.innerHTML = `<span class="word">${word}</span><span class="number">${wordTotal > 9 ? `${wordTotal}/${reduced}` : wordTotal}</span>`;
                    namesRow.appendChild(block);
                }
            });
        }

        function getArcanaArray(total) {
            if (total === 0) return [];
            let sum = total;
            
            while (sum > 22) {
                sum = sumStringDigits(sum.toString());
            }

            const primary = sum;
            const arcanas = [primary];
            
            if (primary >= 11 && primary <= 22) {
                const secondary = sumStringDigits(primary.toString());
                arcanas.push(secondary);
            }
            
            return arcanas;
        }

        function calculateAll() {
            const day = document.getElementById('dayInput').value;
            const month = document.getElementById('monthInput').value;
            const year = document.getElementById('yearInput').value;
            const nameRaw = document.getElementById('nameInput').value;

            if (!day || !month || !year || !nameRaw.trim()) {
                alert("Por favor, preencha todos os campos da data e o nome completo.");
                return;
            }

            const dateStr = day + month + year;
            const dateTotalSum = sumStringDigits(dateStr);
            const dateArcanas = getArcanaArray(dateTotalSum);
            renderResult('date', dateArcanas);

            const words = nameRaw.split(/\s+/).filter(w => w.length > 0);
            let nameTotalSum = 0;
            words.forEach(word => {
                const normalizedWord = word
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toUpperCase()
                    .replace(/[^A-Z]/g, '');

                let wordTotal = 0;
                for (let char of normalizedWord) {
                    if (chaldeanValues[char]) wordTotal += chaldeanValues[char];
                }
                nameTotalSum += reduceToSingleDigit(wordTotal);
            });

            const nameArcanas = getArcanaArray(nameTotalSum);
            renderResult('name', nameArcanas);

            document.getElementById('resultsArea').style.display = 'flex';
        }

            const textContainer = document.getElementById(`${type}InfluenceText`);

            textContainer.innerHTML = '';

                const imgClass = index === 0 ? 'tarot-img primary' : 'tarot-img secondary';

            });

                htmlText += `
                <div class="secondary-note">
                    <strong>Atenção ao Arcano Secundário</strong>
                    Às vezes, o <em>Arcano Secundário</em> exerce uma influência maior ou mais evidente na vida da pessoa do que o Principal. É importante que você analise a sua própria trajetória, observe com qual dessas duas forças você se identifica mais no dia a dia, e aprenda a trabalhar com ela a seu favor.
                </div>`;
            }
            
            arcanaIds.forEach((id, index) => {
                const data = tarotDB[id];
                const titleLabel = index === 0 ? "Arcano Principal" : "Arcano Secundário";
                
                htmlText += `
                    <h4>${titleLabel}: ${data.title}</h4>
                    <div class="influence-item"><strong>Vida Material:</strong> ${data.mat}</div>

                    <div class="influence-item" style="margin-bottom: 20px;"><strong>Conselho:</strong> ${data.cons}</div>
                `;
            });

            textContainer.innerHTML = htmlText;
        }
    </script>
</body>
