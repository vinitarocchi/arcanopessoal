<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcano Pessoal - Vini Astros</title>
    <style>
        :root {
            /* Cores extraídas da imagem e adaptadas para Dark Mode */
            --bg-color: #131314;
            --card-bg: #1e1e20;
            --primary-blue: #2b52c3;
            --primary-blue-hover: #22429e;
            --text-main: #e8eaed;
            --text-muted: #9aa0a6;
            --border-color: #3c4043;
            --shadow: 0 6px 20px rgba(0, 0, 0, 0.4); /* Reduzido em 20% */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 12px 80px 12px; /* Reduzido em 20% */
            box-sizing: border-box;
            background-image: radial-gradient(#3c4043 1px, transparent 1px);
            background-size: 12px 12px; /* Reduzido em 20% */
        }
        
        .container {
            background-color: var(--card-bg);
            border-radius: 13px; /* Reduzido em 20% */
            padding: 1.6rem; /* Reduzido em 20% */
            width: 100%;
            max-width: 480px; /* Reduzido em 20% */
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        h1 {
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 3px;
            font-size: 1.04rem; /* Reduzido em 20% */
            font-weight: 700;
            letter-spacing: -0.5px;
            transition: opacity 0.5s ease, font-size 0.3s ease;
        }

        #mainTitle.game-mode-title {
            font-size: 0.52rem; /* Reduzido pela metade, apenas na sessão de escolher a carta */
        }

        .subtitle {
            font-size: 0.56rem; /* Reduzido em 20% */
            color: var(--text-muted);
            margin-bottom: 1.6rem; /* Reduzido em 20% */
            font-weight: 400;
        }

        /* ======== ESTILOS DA CALCULADORA ======== */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Reduzido em 20% */
            margin-bottom: 0.96rem; /* Reduzido em 20% */
            text-align: left;
        }

        label {
            font-size: 0.52rem; /* Reduzido em 20% */
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-slots {
            display: flex;
            gap: 8px; /* Reduzido em 20% */
        }

        select, input {
            width: 100%;
            padding: 8px 10px; /* Reduzido em 20% */
            font-size: 0.68rem; /* Reduzido em 20% */
            background-color: #282a2c;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            border-radius: 6px; /* Reduzido em 20% */
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239aa0a6%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 8px top 50%;
            background-size: 8px auto;
        }

        .date-slots select:nth-child(1),
        .date-slots select:nth-child(2) { width: 30%; }
        .date-slots select:nth-child(3) { width: 40%; }

        select:focus, input:focus {
            background-color: #303236;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(43, 82, 195, 0.2);
        }

        .names-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px; /* Reduzido em 20% */
            margin: 0.64rem 0 1.2rem 0; /* Reduzido em 20% */
            min-height: 32px; /* Reduzido em 20% */
        }

        .name-block {
            background-color: #282a2c;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 4px 8px; /* Reduzido em 20% */
            display: flex;
            align-items: center;
            gap: 5px;
            animation: fadeIn 0.3s ease;
        }

        .name-block .word {
            font-size: 0.52rem; /* Reduzido em 20% */
            color: var(--text-muted);
            text-transform: capitalize;
        }

        .name-block .number {
            font-size: 0.68rem; /* Reduzido em 20% */
            font-weight: 700;
            color: #8bb2e5;
        }

        /* ======== ESTILOS DE BOTÕES E DIVISORES ======== */
        .btn-calc {
            background-color: var(--primary-blue);
            color: #ffffff;
            border: none;
            padding: 10px 16px; /* Reduzido em 20% */
            font-size: 0.64rem; /* Reduzido em 20% */
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 3px 8px rgba(43, 82, 195, 0.3);
            margin-top: 8px;
        }

        .btn-calc:hover {
            background-color: var(--primary-blue-hover);
            transform: translateY(-2px);
        }

        .or-separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0; /* Reduzido em 20% */
            color: var(--text-muted);
            font-size: 0.6rem; /* Reduzido em 20% */
            font-weight: 700;
            letter-spacing: 1px;
        }

        .or-separator::before, .or-separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .or-separator span {
            padding: 0 12px; /* Reduzido em 20% */
        }

        .btn-alt {
            background-color: var(--primary-blue);
            color: #ffffff;
            border: none;
            padding: 10px 16px; /* Reduzido em 20% */
            font-size: 0.64rem; /* Reduzido em 20% */
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 3px 8px rgba(43, 82, 195, 0.3);
        }

        .btn-alt:hover {
            background-color: var(--primary-blue-hover);
            transform: translateY(-2px);
        }

        /* ======== RESULTADOS ======== */
        .results-area {
            display: flex;
            flex-direction: column;
            gap: 24px; /* Reduzido em 20% */
            margin-top: 2rem; /* Reduzido em 20% */
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section {
            background-color: #282a2c;
            border: 1px solid var(--border-color);
            border-radius: 10px; /* Reduzido em 20% */
            padding: 16px 12px; /* Reduzido em 20% */
            position: relative;
        }

        .section-title {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--primary-blue);
            color: #ffffff;
            padding: 2px 10px; /* Reduzido em 20% */
            border-radius: 12px;
            font-size: 0.52rem; /* Reduzido em 20% */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .cards-display {
            display: flex;
            justify-content: center;
            margin-bottom: 16px; /* Reduzido em 20% */
            padding-top: 8px; /* Reduzido em 20% */
        }

        .tarot-img {
            width: 76px; /* Reduzido em 20% */
            border-radius: 5px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            position: relative;
        }

        .tarot-img:hover {
            transform: translateY(-4px);
            z-index: 10 !important;
        }

        .tarot-img.secondary {
            margin-left: -28px; /* Reduzido em 20% */
            z-index: 1;
            transform: rotate(3deg) translateY(3px);
        }
        
        .tarot-img.primary {
            z-index: 2;
        }

        .secondary-note {
            background-color: rgba(43, 82, 195, 0.15);
            border-left: 3px solid var(--primary-blue);
            padding: 10px; /* Reduzido em 20% */
            border-radius: 0 5px 5px 0;
            margin-bottom: 16px; /* Reduzido em 20% */
            text-align: left;
            font-size: 0.6rem; /* Reduzido em 20% */
            line-height: 1.5;
            color: #d1d5db; 
        }

        .secondary-note strong {
            color: #8bb2e5;
            display: block;
            margin-bottom: 3px;
            font-size: 0.64rem; /* Reduzido em 20% */
        }

        .influence-text {
            text-align: left;
            font-size: 0.64rem; /* Reduzido em 20% */
            line-height: 1.5;
            color: #d1d5db;
        }

        .influence-text h4 {
            margin: 0 0 10px 0; /* Reduzido em 20% */
            color: var(--text-main);
            font-size: 0.72rem; /* Reduzido em 20% */
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px; /* Reduzido em 20% */
        }

        .influence-item {
            margin-bottom: 8px; /* Reduzido em 20% */
        }

        .influence-item strong {
            color: #8bb2e5;
            background-color: rgba(139, 178, 229, 0.15);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 0.56rem; /* Reduzido em 20% */
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 3px;
        }

        /* ======== JOGO DE TAROT ======== */
        #gameMode {
            animation: fadeIn 0.5s ease;
        }

        #gameModeHeader {
            transition: opacity 0.5s ease;
            margin-bottom: 16px;
        }

        .game-title {
            font-size: 0.88rem; /* Reduzido em 20% */
            color: var(--text-main);
            margin: 0;
            font-weight: 700;
        }

        /* Sistema Flexbox para garantir 8, 8 e 6 cartas centralizadas */
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px; /* Reduzido em 20% */
            margin: 16px 0; /* Reduzido em 20% */
            perspective: 1000px;
        }

        .flip-card {
            width: calc(12.5% - 6px); /* Exatamente 8 cartas por fileira, considerando o gap */
            aspect-ratio: 2 / 3.2;
            background-color: transparent;
            cursor: pointer;
            position: relative;
        }

        .flip-card-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg) scale(1.1);
            z-index: 10;
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 5px; /* Reduzido em 20% */
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }

        .flip-card-front {
            background: radial-gradient(circle at center, #1e3c72 0%, #131314 100%);
            border: 1px solid #8bb2e5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.3s;
        }

        .flip-card-front::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 88%;
            border: 1px dashed rgba(139, 178, 229, 0.4);
            border-radius: 4px;
        }

        .flip-card-front::after {
            content: '✧';
            color: #8bb2e5;
            font-size: 0.88rem; /* Reduzido em 20% */
            opacity: 0.7;
        }

        .flip-card-back {
            background-color: #282a2c;
            transform: rotateY(180deg);
            background-size: cover;
            background-position: center;
            border: 1px solid #8bb2e5;
        }

        .flip-card:hover .flip-card-inner {
            transform: translateY(-5px);
        }

        .flip-card.flipped:hover .flip-card-inner {
            transform: rotateY(180deg) scale(1.1);
        }

        .flip-card:hover .flip-card-front {
            box-shadow: 0 6px 12px rgba(139, 178, 229, 0.3);
        }

        /* ======== ESTILOS DO BOTÃO FLUTUANTE ======== */
        .floating-container {
            position: fixed;
            bottom: 20px; /* Reduzido em 20% */
            right: 20px; /* Reduzido em 20% */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px; /* Reduzido em 20% */
            z-index: 1000;
        }

        .floating-text {
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 0.6rem; /* Reduzido em 20% */
            padding: 5px 11px; /* Reduzido em 20% */
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            animation: fadeIn 0.8s ease;
        }

        .floating-text::after {
            content: '';
            position: absolute;
            bottom: -5px; /* Reduzido em 20% */
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: var(--card-bg) transparent transparent transparent;
            z-index: 2;
        }

        .floating-text::before {
            content: '';
            position: absolute;
            bottom: -7px; /* Reduzido em 20% */
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: var(--border-color) transparent transparent transparent;
            z-index: 1;
        }

        .floating-btn {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            text-decoration: none;
            padding: 10px 18px; /* Reduzido em 20% */
            border-radius: 30px;
            font-size: 0.64rem; /* Reduzido em 20% */
            font-weight: 700;
            box-shadow: 0 3px 12px rgba(220, 39, 67, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: fadeIn 0.8s ease;
        }

        .floating-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 5px 16px rgba(220, 39, 67, 0.6);
        }

        @media (max-width: 600px) {
            .floating-container {
                bottom: 16px;
                right: 12px;
            }
            .floating-btn {
                padding: 8px 14px;
                font-size: 0.6rem;
            }
            .floating-text {
                font-size: 0.56rem;
                padding: 4px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1 id="mainTitle">Arcano Pessoal <br>by @VINITAROCCHI</h1>
        
        <!-- MODO CALCULADORA (Numerologia) -->
        <div id="calculatorMode">
            <div class="subtitle">Influências da Data de Nascimento e do Nome de Expressão.</div>
            
            <div class="form-section">
                <label>Data de Nascimento (Arcano Principal)</label>
                <div class="date-slots">
                    <select id="dayInput"></select>
                    <select id="monthInput"></select>
                    <select id="yearInput"></select>
                </div>
            </div>

            <div class="form-section">
                <label for="nameInput">Nome Completo (Arcano de Expressão)</label>
                <input type="text" id="nameInput" placeholder="Ex: Vinicius Silva" autocomplete="off" oninput="calculateLive()">
            </div>
            
            <div class="names-row" id="namesRow"></div>
            
            <button class="btn-calc" onclick="calculateAll()">Calcular Arcano Pessoal</button>
            
            <div class="or-separator">
                <span>OU</span>
            </div>

            <button class="btn-calc" onclick="openTarotGame()">Escolha você mesmo uma carta como seu Arcano Pessoal</button>
            
            <div class="results-area" id="resultsArea">
                <div class="result-section">
                    <div class="section-title">Influência da Data</div>
                    <div class="cards-display" id="dateCardsDisplay"></div>
                    <div class="influence-text" id="dateInfluenceText"></div>
                </div>

                <div class="result-section">
                    <div class="section-title">Influência do Nome</div>
                    <div class="cards-display" id="nameCardsDisplay"></div>
                    <div class="influence-text" id="nameInfluenceText"></div>
                </div>
            </div>
        </div>

        <!-- MODO JOGO DE TAROT (Sorteio) -->
        <div id="gameMode" style="display: none;">
            <div id="gameModeHeader">
                <!-- Título único requisitado -->
                <h2 class="game-title">Conecte-se com sua intuição e escolha uma carta.</h2>
            </div>
            
            <div class="cards-grid" id="cardsGrid"></div>
            
            <!-- Botão Voltar para caso de desistência (Aparece embaixo do grid) -->
            <div id="gameActions" style="margin-top: 16px; transition: opacity 0.5s ease;">
                <button class="btn-alt" onclick="backToCalculator()">Voltar para a Calculadora</button>
            </div>

            <div id="gameResultArea" style="display: none;"></div>
        </div>

    </div>

    <!-- ======== ESTRUTURA DO BOTÃO FLUTUANTE ======== -->
    <div class="floating-container">
        <div class="floating-text">GOSTOU DESTE SITE?</div>
        <a href="https://instagram.com/vinitarocchi" target="_blank" class="floating-btn">Me Siga no Instagram</a>
    </div>

    <script>
        // Inicializa os seletores de Data
        window.onload = function() {
            const daySel = document.getElementById('dayInput');
            for(let i=1; i<=31; i++) {
                daySel.innerHTML += `<option value="${i}">${i}</option>`;
            }
            
            const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
            const monthSel = document.getElementById('monthInput');
            months.forEach((m, index) => {
                const val = (index + 1).toString().padStart(2, '0');
                monthSel.innerHTML += `<option value="${val}">${m}</option>`;
            });
            
            const yearSel = document.getElementById('yearInput');
            for(let i=2026; i>=1900; i--) {
                const isSelected = (i === 1900) ? 'selected' : '';
                yearSel.innerHTML += `<option value="${i}" ${isSelected}>${i}</option>`;
            }
        };

        const chaldeanValues = {
            'A': 1, 'I': 1, 'J': 1, 'Q': 1, 'Y': 1, 'B': 2, 'K': 2, 'R': 2,
            'C': 3, 'G': 3, 'L': 3, 'S': 3, 'D': 4, 'M': 4, 'T': 4,
            'E': 5, 'H': 5, 'N': 5, 'X': 5, 'U': 6, 'V': 6, 'W': 6,
            'O': 7, 'Z': 7, 'F': 8, 'P': 8
        };

        const tarotDB = {

        // Funções da Calculadora Numerológica
        function sumStringDigits(str) {
            return str.split('').reduce((acc, digit) => acc + parseInt(digit), 0);
        }

        function reduceToSingleDigit(num) {
            if (num === 0) return 0;
            let sum = num;
            while (sum > 9) {
                sum = sum.toString().split('').reduce((acc, digit) => acc + parseInt(digit), 0);
            }
            return sum;
        }

        function calculateLive() {
            const rawValue = document.getElementById('nameInput').value;
            const namesRow = document.getElementById('namesRow');
            
            namesRow.innerHTML = '';
            
            if (!rawValue.trim()) return;

            const words = rawValue.split(/\s+/).filter(w => w.length > 0);

            words.forEach(word => {
                const normalizedWord = word
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toUpperCase()
                    .replace(/[^A-Z]/g, '');

                let wordTotal = 0;
                for (let char of normalizedWord) {
                    if (chaldeanValues[char]) wordTotal += chaldeanValues[char];
                }

                if (wordTotal > 0) {
                    const reduced = reduceToSingleDigit(wordTotal);
                    const block = document.createElement('div');
                    block.className = 'name-block';
                    block.innerHTML = `<span class="word">${word}</span><span class="number">${wordTotal > 9 ? `${wordTotal}/${reduced}` : wordTotal}</span>`;
                    namesRow.appendChild(block);
                }
            });
        }

        function getArcanaArray(total) {
            if (total === 0) return [];
            let sum = total;
            
            while (sum > 22) {
                sum = sumStringDigits(sum.toString());
            }

            const primary = sum;
            const arcanas = [primary];
            
            if (primary >= 11 && primary <= 22) {
                const secondary = sumStringDigits(primary.toString());
                arcanas.push(secondary);
            }
            
            return arcanas;
        }

        function calculateAll() {
            const day = document.getElementById('dayInput').value;
            const month = document.getElementById('monthInput').value;
            const year = document.getElementById('yearInput').value;
            const nameRaw = document.getElementById('nameInput').value;

            if (!day || !month || !year || !nameRaw.trim()) {
                alert("Por favor, preencha todos os campos da data e o nome completo.");
                return;
            }

            const dateStr = day + month + year;
            const dateTotalSum = sumStringDigits(dateStr);
            const dateArcanas = getArcanaArray(dateTotalSum);
            renderResult('date', dateArcanas);

            const words = nameRaw.split(/\s+/).filter(w => w.length > 0);
            let nameTotalSum = 0;
            words.forEach(word => {
                const normalizedWord = word
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "")
                    .toUpperCase()
                    .replace(/[^A-Z]/g, '');

                let wordTotal = 0;
                for (let char of normalizedWord) {
                    if (chaldeanValues[char]) wordTotal += chaldeanValues[char];
                }
                nameTotalSum += reduceToSingleDigit(wordTotal);
            });

            const nameArcanas = getArcanaArray(nameTotalSum);
            renderResult('name', nameArcanas);

            document.getElementById('resultsArea').style.display = 'flex';
        }

        function renderResult(type, arcanaIds) {
            const displayContainer = document.getElementById(`${type}CardsDisplay`);
            const textContainer = document.getElementById(`${type}InfluenceText`);
            
            displayContainer.innerHTML = '';
            textContainer.innerHTML = '';

            if (arcanaIds.length === 0) return;

            arcanaIds.forEach((id, index) => {
                const data = tarotDB[id];
                const imgClass = index === 0 ? 'tarot-img primary' : 'tarot-img secondary';
                displayContainer.innerHTML += `<img src="${data.img}" alt="${data.title}" title="${data.title}" class="${imgClass}">`;
            });

            let htmlText = '';

            if (arcanaIds.length > 1) {
                htmlText += `
                <div class="secondary-note">
                    <strong>Atenção ao Arcano Secundário</strong>
                    Às vezes, o <em>Arcano Secundário</em> exerce uma influência maior ou mais evidente na vida da pessoa do que o Principal. É importante que você analise a sua própria trajetória, observe com qual dessas duas forças você se identifica mais no dia a dia, e aprenda a trabalhar com ela a seu favor.
                </div>`;
            }
            
            arcanaIds.forEach((id, index) => {
                const data = tarotDB[id];
                const titleLabel = index === 0 ? "Arcano Principal" : "Arcano Secundário";
                
                htmlText += `
                    <h4>${titleLabel}: ${data.title}</h4>
                    <div class="influence-item"><strong>Vida Material:</strong> ${data.mat}</div>
                    <div class="influence-item"><strong>Vida Mental:</strong> ${data.ment}</div>
                    <div class="influence-item"><strong>Vida Sentimental:</strong> ${data.sent}</div>
                    <div class="influence-item"><strong>Profissões Associadas:</strong> ${data.prof}</div>
                    <div class="influence-item"><strong>Advertência:</strong> ${data.adv}</div>
                    <div class="influence-item" style="margin-bottom: 16px;"><strong>Conselho:</strong> ${data.cons}</div>
                `;
            });

            textContainer.innerHTML = htmlText;
        }

        // ==========================================
        // LÓGICA DO JOGO DE TAROT (Sorteio)
        // ==========================================

        function openTarotGame() {
            document.getElementById('calculatorMode').style.display = 'none';
            document.getElementById('gameMode').style.display = 'block';
            
            initTarotCards();
        }

        function initTarotCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            grid.style.display = 'flex'; // Usando display flex conforme o novo CSS
            
            const mainTitle = document.getElementById('mainTitle');
            mainTitle.style.display = 'block';
            mainTitle.classList.add('game-mode-title');
            setTimeout(() => mainTitle.style.opacity = '1', 10);
            
            const gameHeader = document.getElementById('gameModeHeader');
            gameHeader.style.display = 'block';
            setTimeout(() => gameHeader.style.opacity = '1', 10);

            // Garante que o botão voltar apareça
            const gameActions = document.getElementById('gameActions');
            gameActions.style.display = 'block';
            setTimeout(() => gameActions.style.opacity = '1', 10);
            
            document.getElementById('gameResultArea').style.display = 'none';
            
            let deck = [];
            for(let i=1; i<=22; i++) deck.push(i);
            deck = deck.sort(() => Math.random() - 0.5);
            
            deck.forEach((arcanaId, index) => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'flip-card';
                cardWrapper.onclick = () => selectCard(cardWrapper, arcanaId);
                
                const inner = document.createElement('div');
                inner.className = 'flip-card-inner';
                
                const front = document.createElement('div');
                front.className = 'flip-card-front';
                
                const back = document.createElement('div');
                back.className = 'flip-card-back';
                back.style.backgroundImage = `url('${tarotDB[arcanaId].img}')`;
                
                inner.appendChild(front);
                inner.appendChild(back);
                cardWrapper.appendChild(inner);
                grid.appendChild(cardWrapper);
            });
        }

        function selectCard(cardElement, arcanaId) {
            const allCards = document.querySelectorAll('.flip-card');
            allCards.forEach(c => c.onclick = null);
            
            document.getElementById('mainTitle').style.opacity = '0';
            document.getElementById('gameModeHeader').style.opacity = '0';
            document.getElementById('gameActions').style.opacity = '0'; // Esconde botão voltar quando clicar na carta
            
            cardElement.classList.add('flipped');
            
            setTimeout(() => {
                allCards.forEach(c => {
                    if(c !== cardElement) {
                        c.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                        c.style.opacity = '0';
                        c.style.transform = 'scale(0.8)';
                    }
                });
                
                setTimeout(() => {
                    document.getElementById('cardsGrid').style.display = 'none';
                    document.getElementById('mainTitle').style.display = 'none';
                    document.getElementById('gameModeHeader').style.display = 'none';
                    document.getElementById('gameActions').style.display = 'none'; // Some completamente do fluxo
                    showTarotResult(arcanaId);
                }, 500); 
                
            }, 800); 
        }

        function showTarotResult(arcanaId) {
            const resultArea = document.getElementById('gameResultArea');
            resultArea.style.display = 'block';
            resultArea.style.animation = 'fadeIn 0.8s ease';
            
            const data = tarotDB[arcanaId];
            
            let htmlText = `
                <div class="result-section" style="margin-bottom: 20px;">
                    <div class="section-title">Seu Arcano Sorteado</div>
                    <div class="cards-display" style="margin-bottom: 20px;">
                        <!-- Reduzido em 20% matematicamente para 112px -->
                        <img src="${data.img}" alt="${data.title}" class="tarot-img primary" style="width: 112px; transform: scale(1.05);">
                    </div>
                    <div class="influence-text">
                        <h4>${data.title}</h4>
                        <div class="influence-item"><strong>Vida Material:</strong> ${data.mat}</div>
                        <div class="influence-item"><strong>Vida Mental:</strong> ${data.ment}</div>
                        <div class="influence-item"><strong>Vida Sentimental:</strong> ${data.sent}</div>
                        <div class="influence-item"><strong>Profissões Associadas:</strong> ${data.prof}</div>
                        <div class="influence-item"><strong>Advertência:</strong> ${data.adv}</div>
                        <div class="influence-item" style="margin-bottom: 16px;"><strong>Conselho:</strong> ${data.cons}</div>
                    </div>
                </div>
                
                <button class="btn-calc" onclick="initTarotCards()">Tirar Outra Carta</button>
                <button class="btn-alt" style="margin-top: 12px;" onclick="backToCalculator()">Voltar para a Calculadora</button>
            `;
            
            resultArea.innerHTML = htmlText;
        }

        function backToCalculator() {
            document.getElementById('gameMode').style.display = 'none';
            document.getElementById('calculatorMode').style.display = 'block';
            
            const mainTitle = document.getElementById('mainTitle');
            mainTitle.classList.remove('game-mode-title');
            mainTitle.style.display = 'block';
            setTimeout(() => mainTitle.style.opacity = '1', 10);
        }

    </script>
</body>
</html>
